<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriGuard AI Pro</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header id="main-header">
            <h1>🌿 AgriGuard</h1>
            <span id="status-badge" class="offline-badge">AI LOADING...</span>
        </header>

        <main id="main-ui">
            <div class="camera-card">
                <div id="display-area">
                    <div class="instruction-box">
                        <div class="pulsing-circle">📸</div>
                        <h3>Ready to Scan</h3>
                        <p>Upload a clear leaf photo</p>
                    </div>
                </div>
                <input type="file" id="camera-input" accept="image/*" capture="camera" hidden>
                <button id="capture-btn">START SCAN</button>
            </div>
        </main>

        <div id="results-card" class="hidden">
            <button class="back-btn" onclick="resetApp()">← New Scan</button>
            <div class="report-container">
                <span class="report-tag">CUSTOM AI DIAGNOSIS</span>
                <h2 id="disease-name">Analyzing...</h2>
                
                <div class="accuracy-meter">
                    <div class="meter-label">
                        <span>AI Confidence Score</span>
                        <span id="confidence-pct">0%</span>
                    </div>
                    <div class="progress-bar"><div id="severity-fill"></div></div>
                </div>

                <div class="treatment-box">
                    <div id="treatment-info">Processing botanical data...</div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
